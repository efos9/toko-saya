<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambah Barang Baru</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        utama: '#165DFF',
                        sukses: '#00C48C',
                        bahaya: '#F53F3F',
                        peringatan: '#FF7D00',
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .shadow-ku { box-shadow: 0 4px 16px 0 rgba(0,0,0,0.1); }
            .tombol-ku {transition: all 0.2s ease;}
            .tombol-ku:active {transform: scale(0.96);}
        }
    </style>
</head>
<body class="bg-gray-50 font-poppins">

    <div class="container mx-auto px-3 py-4 max-w-md">
        <!-- ✅ HEADER + TOMBOL KEMBALI (Langsung balik ke halaman scan) -->
        <div class="bg-peringatan text-white p-4 rounded-2xl shadow-ku mb-5 flex items-center justify-between">
            <a href="kasir_scan_kalkulator.html" class="text-white text-[22px] p-2">
                <i class="fa fa-arrow-left"></i>
            </a>
            <div class="text-center flex-1">
                <h1 class="text-[18px] font-bold">➕ TAMBAH BARANG BARU</h1>
                <p class="text-xs opacity-90">Simpan sekali, pakai selamanya</p>
            </div>
            <div></div>
        </div>


        <div class="bg-white p-5 rounded-2xl shadow-ku">
            <form id="formBarang" class="space-y-4">
                <div>
                    <label class="font-semibold mb-1 block">🔢 KODE BARCODE / KODE BARANG *</label>
                    <input type="text" id="kodeBaru" placeholder="Contoh: 899123456789" class="w-full border rounded-xl p-3" required>
                </div>

                <div>
                    <label class="font-semibold mb-1 block">📛 NAMA LENGKAP BARANG *</label>
                    <input type="text" id="namaBaru" placeholder="Contoh: Mie Instan Goreng 80gr" class="w-full border rounded-xl p-3" required>
                </div>

                <div>
                    <label class="font-semibold mb-1 block">💰 HARGA JUAL (Rp) *</label>
                    <input type="number" id="hargaBaru" placeholder="Contoh: 3500" class="w-full border rounded-xl p-3" required>
                </div>

                <button type="submit" class="w-full bg-sukses text-white py-3 rounded-xl font-bold tombol-ku mt-3">
                    ✅ SIMPAN KE SISTEM
                </button>
            </form>
        </div>

    </div>


<script>
// ==== Ambil akun yang sedang pakai ====
let akunAktif = localStorage.getItem('akun_aktif');
let daftarBarang = JSON.parse(localStorage.getItem('barang_scan_'+akunAktif)) || [];


document.getElementById('formBarang').onsubmit = function(e){
    e.preventDefault();

    let kode = document.getElementById('kodeBaru').value.trim();
    let nama = document.getElementById('namaBaru').value.trim();
    let harga = parseInt(document.getElementById('hargaBaru').value);

    // Cek kalau kode sudah ada
    let cekAda = daftarBarang.find(b => b.kode === kode);
    if(cekAda) return alert("❌ Kode ini SUDAH DISIMPAN!\nGanti kode lain atau ubah yang lama.");

    // Simpan ke daftar
    daftarBarang.push({kode:kode, nama:nama, harga:harga});
    localStorage.setItem('barang_scan_'+akunAktif, JSON.stringify(daftarBarang));

    alert("✅ BERHASIL DISIMPAN!\n\nLangsung kembali ke halaman Scan...");
    window.location.href = "kasir_scan_kalkulator.html";
}
</script>

</body>
</html>
