<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏪 WAE RUA INDOMARET</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {margin:0; padding:0; box-sizing:border-box; font-family:Arial;}
        body {background:#f8f9fa;}

        /* ==== MENU NAVIGASI ==== */
        .header {background:#16a085; color:white; padding:15px; position:relative; z-index:10; width:100%;}
        .tombol-menu {font-size:26px; font-weight:bold; border:none; background:transparent; color:white; cursor:pointer;}
        .sidebar {position:fixed; top:0; left:-280px; width:260px; height:100%; background:#16a085; padding-top:20px; transition:all 0.3s ease; z-index:99; box-shadow:2px 0 10px rgba(0,0,0,0.15);}
        .sidebar.buka {left:0;}
        .sidebar a {display:block; color:white; padding:12px 18px; text-decoration:none; font-size:16px; border-bottom:1px solid rgba(255,255,255,0.15);}
        .sidebar a:hover {background:#1abc9c;}
        .overlay {position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.4); z-index:90; display:none;}
        .overlay.aktif {display:block;}

        /* ==== KOTAK TOMBOL ==== */
        .konten {padding:20px; max-width:420px; margin:auto; width:100%;}
        .kotak-warna {
            padding:18px 15px;
            border-radius:10px;
            color:white;
            font-weight:bold;
            font-size:17px;
            margin:10px 0;
            text-align:center;
            box-shadow:0 3px 8px rgba(0,0,0,0.12);
            width:100%;
            display:block;
            text-decoration:none;
            border:none;
            cursor:pointer;
        }
        .hijau {background:#27ae60;} /* ✅ INI YANG MINTA SANDI */
        .biru {background:#2980b9;}
        .merah {background:#e74c3c;}
        .ungu {background:#8e44ad;}
        .oren {background:#f39c12;}
    </style>
</head>
<body>

<!-- ✅ MENU SAMPING - SEMUA BEBAS, TANPA SANDI -->
<div class="overlay" id="lapisan" onclick="tutupMenu()"></div>
<div class="sidebar" id="menuSamping">
    <a href="index.html">🏠 Beranda</a>
    <a href="daftar-harga.html">📦 Daftar Barang / Harga</a>
    <a href="https://wa.me/6281327913004" target="_blank">📞 Hubungi Kami</a>
    <a href="tentang.html">ℹ️ Tentang Toko</a>
    <a href="#" onclick="hapusLogin()">🔓 Keluar</a>
</div>

<!-- ✅ KEPALA TOKO -->
<div class="header">
    <button class="tombol-menu" onclick="bukaTutupMenu()">☰</button>
    <h1 style="display:inline-block; margin-left:10px; font-size:20px; font-weight:bold;">🏪 WAE RUA INDOMARET</h1>
    <p style="margin-top:4px; opacity:0.9;">Barang Lengkap • Harga Murah • Terpercaya</p>
</div>

<!-- ✅ ISI UTAMA -->
<div class="konten">
    <!-- ✅ HANYA TOMBOL INI SAJA YANG MINTA SANDI 1234 -->
    <div class="kotak-warna hijau" onclick="cekSandi()">🔐 MASUK SEBAGAI PEMILIK</div>
    
    <a href="daftar-harga.html" class="kotak-warna biru">📄 LIHAT DAFTAR HARGA</a>

    <a href="https://wa.me/6281327913004" target="_blank" class="kotak-warna merah">💬 HUBUNGI KAMI (WHATSAPP)</a>

    <a href="tentang.html" class="kotak-warna ungu">ℹ️ TENTANG TOKO</a>

    <div class="kotak-warna oren">⏰ BUKA 24 JAM • SEMUA BISA DIPESAN</div>
</div>

<script>
const SANDI = "1234"; // ✅ Sandi tetap 1234

// ✅ FUNGSI MENU - SEMUA BEBAS
function bukaTutupMenu(){
    let menu = document.getElementById("menuSamping");
    let lapis = document.getElementById("lapisan");
    menu.classList.toggle("buka");
    lapis.classList.toggle("aktif");
}
function tutupMenu(){
    document.getElementById("menuSamping").classList.remove("buka");
    document.getElementById("lapisan").classList.remove("aktif");
}

// ✅ FUNGSI UTAMA: HANYA DI SINI SAJA MINTA SANDI
function cekSandi(){
    let ketik = prompt("🔒 KHUSUS PEMILIK TOKO!\nMasukkan Sandi Rahasia:");
    if(ketik === SANDI){
        // ✅ Sandi BENAR → langsung masuk ke Dashboard
        window.location.href="admin.html";
    }else{
        alert("❌ SANDI SALAH! HANYA PEMILIK YANG BOLEH MASUK!");
        return false;
    }
}

// ✅ HALAMAN admin.html → TIDAK MINTA SANDI LAGI, KARENA SUDAH DICEK DI SINI
function hapusLogin(){
    localStorage.removeItem("login_ok");
    tutupMenu();
    alert("✅ Berhasil Keluar!");
}

document.onclick = function(e){
    let menu = document.getElementById("menuSamping");
    if(!e.target.matches('.tombol-menu') && menu.classList.contains("buka")){
        tutupMenu();
    }
}
</script>

</body>
</html>
