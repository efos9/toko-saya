<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barang Masuk + Foto</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script>
        // === AMBIL FOTO DARI KAMERA / GALERI ===
        function ambilFoto(){
            let input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.capture = 'camera'; // langsung buka kamera
            input.onchange = e => {
                let berkas = e.target.files[0];
                if(!berkas) return;
                let pembaca = new FileReader();
                pembaca.onload = evt => {
                    document.getElementById('tampil-foto').src = evt.target.result;
                    document.getElementById('fotoSimpan').value = evt.target.result;
                }
                pembaca.readAsDataURL(berkas);
            }
            input.click();
        }

        // === SIMPAN BARANG KE DAFTAR STOK ===
        function simpanBarang(){
            let kode = document.getElementById('kode').value.trim();
            let nama = document.getElementById('nama').value.trim();
            let harga = parseInt(document.getElementById('harga').value);
            let stok = parseInt(document.getElementById('stok').value);
            let foto = document.getElementById('fotoSimpan').value;

            // Cek isi jangan kosong
            if(!kode || !nama || isNaN(harga) || isNaN(stok) || !foto){
                alert("❌ Lengkapi semua data + ambil foto dulu!");
                return;
            }

            // Ambil daftar lama / buat baru
            let daftarBarang = JSON.parse(localStorage.getItem("daftarBarang")) || [];

            // Cek kode sudah ada atau belum
            let ada = daftarBarang.find(b => b.kode === kode);
            if(ada){
                alert("⚠️ Kode barang ini SUDAH ADA! Gunakan kode lain.");
                return;
            }

            // Simpan barang baru
            daftarBarang.push({ kode, nama, harga, stok, foto });
            localStorage.setItem("daftarBarang", JSON.stringify(daftarBarang));

            alert("✅ BERHASIL DISIMPAN!\nData masuk ke daftar stok & harga otomatis.");
            
            // Kosongkan formulir setelah simpan
            document.getElementById('kode').value = "";
            document.getElementById('nama').value = "";
            document.getElementById('harga').value = "";
            document.getElementById('stok').value = "";
            document.getElementById('fotoSimpan').value = "";
            document.getElementById('tampil-foto').src = "https://via.placeholder.com/150?text=FOTO+BARANG";
        }
    </script>
    <style>
        *{margin:0; padding:0; box-sizing:border-box; font-family:Arial, sans-serif;}
        body{background:#f5f5f5; padding:15px;}
        .wadah{max-width:450px; margin:auto; background:#fff; border-radius:12px; padding:20px; box-shadow:0 2px 8px #00000020;}
        h1{text-align:center; color:#2e7d32; margin-bottom:20px; font-size:20px;}
        .kotak-isi{display:flex; flex-direction:column; gap:12px;}
        input{padding:12px 15px; border:1px solid #ccc; border-radius:8px; font-size:15px;}
        .tombol-hijau{background:#2e7d32; color:#fff; border:none; padding:12px; border-radius:8px; font-size:15px; font-weight:bold; cursor:pointer;}
        .tombol-biru{background:#1565c0; color:#fff; border:none; padding:12px; border-radius:8px; font-size:15px; font-weight:bold; cursor:pointer;}
        #tampil-foto{width:100%; height:auto; max-height:220px; object-fit:cover; border-radius:8px; border:1px solid #ddd; margin:8px 0;}
        .navigasi{margin-top:20px; text-align:center; padding-top:15px; border-top:1px solid #ddd;}
        .navigasi a{color:#2e7d32; font-weight:bold; text-decoration:none; margin:0 8px;}
    </style>
</head>
<body>
    <div class="wadah">
        <h1>📸 BARANG MASUK + FOTO</h1>
        <div class="kotak-isi">

            <img id="tampil-foto" src="https://via.placeholder.com/150?text=FOTO+BARANG" alt="Foto Barang">
            <input type="hidden" id="fotoSimpan">
            <button class="tombol-hijau" onclick="ambilFoto()">📷 AMBIL FOTO / UPLOAD</button>

            <input type="text" id="kode" placeholder="📌 KODE BARANG / WARKOT (Wajib)">
            <input type="text" id="nama" placeholder="📝 NAMA BARANG">
            <input type="number" id="harga" placeholder="💰 HARGA SATUAN (Rp)">
            <input type="number" id="stok" placeholder="📦 JUMLAH STOK MASUK">

            <button class="tombol-hijau" onclick="simpanBarang()">💾 SIMPAN KE DAFTAR STOK</button>
        </div>

        <!-- ✅ SEMUA TAUTAN TERHUBUNG BENAR SESUAI NAMA FILE DI FOLDER -->
        <div class="navigasi">
            <a href="bernda.html">🏠 Beranda</a> |
            <a href="profil.html">👤 Profil</a> |
            <a href="barang-beli-scen-plangan.html">🛒 Kasir Scan</a> |

            <a href="daftar.html">📋 Daftar Stok</a> |
            <a href="daftar-barang.html">📋 Daftar Barang</a> |
            <a href="admin.html">⚙️ Admin</a> |
            <a href="tentang.html">ℹ️ Tentang</a>
        </div>
    </div>
</body>
</html>
