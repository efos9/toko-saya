<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📝 CATAT PENJUALAN - TOKO SAYA</title>
    <style>
        * {margin:0; padding:0; box-sizing:border-box; font-family:Arial;}
        body {background:#ecf0f1; padding:20px;}
        .panel {background:white; border-radius:8px; padding:22px; max-width:420px; margin:30px auto; box-shadow:0 2px 10px #00000018;}
        h2 {color:#2980b9; text-align:center; margin-bottom:20px;}
        label {display:block; margin:12px 0 5px; font-weight:bold;}
        input, select {width:100%; padding:9px; border:1px solid #ccc; border-radius:4px; font-size:15px;}
        button {width:100%; padding:11px; color:white; border:none; border-radius:4px; font-weight:bold; margin-top:8px; font-size:16px;}
        .biru {background:#2980b9;} .hijau {background:#27ae60;} .oren {background:#f39c12;}
        .pesan {padding:10px; background:#d4edda; color:#155724; border-radius:4px; margin-top:12px; display:none; text-align:center; font-weight:bold;}
        .riwayat-item {padding:8px; border-bottom:1px dashed #ccc; margin:4px 0;}
    </style>
</head>
<body>
    <div class="panel">
        <h2>📝 CATAT PENJUALAN</h2>
        <div id="info" class="pesan">✅ Tersimpan!</div>

        <label>Pilih Barang:</label>
        <select id="pilihBarang">
            <option value="">-- Pilih Barang --</option>
        </select>

        <label>Jumlah Beli:</label>
        <input type="number" id="jumlahJual" placeholder="Misal: 2">

        <label>Uang Bayar:</label>
        <input type="number" id="uangBayar" placeholder="Masukkan uang pembeli">

        <button class="hijau" onclick="catatJual()">✅ SIMPAN PENJUALAN</button>
        <button class="oren" onclick="window.location.href='admin.html'">⬅️ KEMBALI KE MENU</button>

        <h3 style="margin-top:20px;">📋 RIWAYAT JUALAN</h3>
        <div id="riwayat"></div>
    </div>

<script>
const SANDI_BOS = "efos"; 
let cek = prompt("⚠️ KHUSUS PEMILIK ⚠️\nMasukkan Sandi:");
if(cek !== SANDI_BOS) {alert("❌ SALAH SANDI!"); document.body.innerHTML="";}

let daftarBarang = JSON.parse(localStorage.getItem("semuaBarang")||"[]");
let pilih = document.getElementById("pilihBarang");

daftarBarang.forEach(brg=>{
    let opt = document.createElement("option");
    opt.value = JSON.stringify(brg);
    opt.textContent = `${brg.nama} - Rp ${brg.harga}`;
    pilih.appendChild(opt);
});

function catatJual(){
    let data = JSON.parse(pilih.value);
    let jml = parseInt(document.getElementById("jumlahJual").value);
    let bayar = parseInt(document.getElementById("uangBayar").value);
    if(!data||!jml||!bayar) return alert("❌ Isi lengkap!");
    if(data.stok < jml) return alert("❌ Stok kurang! Sisa: "+data.stok);

    let total = data.harga * jml;
    let kembali = bayar - total;
    if(kembali <0) return alert("❌ Uang kurang!");

    let semua = JSON.parse(localStorage.getItem("semuaBarang")||"[]");
    let cari = semua.find(b=>b.nama==data.nama);
    cari.stok -= jml;
    localStorage.setItem("semuaBarang",JSON.stringify(semua));

    let riwayat = JSON.parse(localStorage.getItem("riwayatJual")||"[]");
    riwayat.unshift({nama:data.nama, jumlah:jml, total:total, bayar:bayar, kembali:kembali, waktu:new Date().toLocaleString('id-ID')});
    localStorage.setItem("riwayatJual",JSON.stringify(riwayat));

    document.getElementById("info").style.display="block"; setTimeout(()=>document.getElementById("info").style.display="none",2500);
    tampilRiwayat();
}

function tampilRiwayat(){
    let riwayat = JSON.parse(localStorage.getItem("riwayatJual")||"[]");
    let kotak = document.getElementById("riwayat"); kotak.innerHTML="";
    riwayat.forEach(r=>{
        kotak.innerHTML += `<div class="riwayat-item">
            <b>${r.nama}</b> x${r.jumlah}<br>
            Total: Rp ${r.total.toLocaleString('id-ID')} | Kembali: Rp ${r.kembali.toLocaleString('id-ID')}<br>
            <small>${r.waktu}</small>
        </div>`;
    });
}
window.onload=tampilRiwayat;
</script>
</body>
</html>
