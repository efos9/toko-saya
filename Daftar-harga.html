<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📄 DAFTAR HARGA - TOKO SAYA</title>
    <style>
        * {margin:0; padding:0; box-sizing:border-box; font-family:Arial;}
        body {background:#ecf0f1; padding:20px;}
        .panel {background:white; border-radius:8px; padding:22px; max-width:420px; margin:30px auto; box-shadow:0 2px 10px #00000018;}
        h2 {color:#8e44ad; text-align:center; margin-bottom:20px;}
        .baris {padding:10px; border-bottom:1px solid #ddd; display:flex; justify-content:space-between; font-weight:bold;}
        .tombol {background:#f39c12; color:white; padding:10px; text-align:center; border-radius:4px; text-decoration:none; display:block; margin-top:15px; font-weight:bold;}
    </style>
</head>
<body>
    <div class="panel">
        <h2>📄 DAFTAR HARGA BARANG</h2>
        <div id="daftar"></div>
        <a href="admin.html" class="tombol">⬅️ KEMBALI KE MENU</a>
    </div>

<script>
let daftar = JSON.parse(localStorage.getItem("semuaBarang")||"[]");
let kotak = document.getElementById("daftar");
if(daftar.length===0){kotak.innerHTML=`<div class="baris">Belum ada barang</div>`;}
else{daftar.forEach(brg=>{
    kotak.innerHTML += `<div class="baris">
        <span>${brg.nama}</span>
        <span>Rp ${brg.harga.toLocaleString('id-ID')}</span>
    </div>`;
})}
</script>
</body>
</html>
