<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 TOKO SAYA - HALAMAN PEMILIK</title>
    <style>
        * {margin:0; padding:0; box-sizing:border-box; font-family:Arial;}
        body {background:#ecf0f1; padding:20px;}
        .panel {background:white; border-radius:8px; padding:22px; max-width:420px; margin:30px auto; box-shadow:0 2px 10px #00000018;}
        h2 {color:#27ae60; text-align:center; margin-bottom:20px;}
        h3 {color:#333; border-bottom:1px solid #ccc; padding-bottom:5px; margin:20px 0 10px;}
        label {display:block; margin:12px 0 5px; font-weight:bold;}
        input, select {width:100%; padding:9px; border:1px solid #ccc; border-radius:4px; font-size:15px;}
        button {width:100%; padding:11px; color:white; border:none; border-radius:4px; font-weight:bold; margin-top:8px; font-size:16px; cursor:pointer;}
        .hijau {background:#27ae60;} .biru {background:#2980b9;} .oren {background:#f39c12;}
        .ungu {background:#8e44ad;} .merah {background:#e74c3c;} .hijau-muda {background:#16a085;}
        .pesan {padding:10px; background:#d4edda; color:#155724; border-radius:4px; margin-top:12px; display:none; text-align:center; font-weight:bold;}
        .kotak-laporan {background:#fef3cd; padding:12px; border-radius:6px; margin-top:15px; color:#856404; font-weight:bold; text-align:center; font-size:17px;}
        .barang-item {display:flex; justify-content:space-between; align-items:center; padding:8px; border-bottom:1px dashed #ddd; margin:4px 0;}
        .menu-pilih {position:relative; margin:12px 0;}
        .tombol-pilih {width:100%; text-align:left; background:#f1f1f1; color:#333; border:1px solid #ccc;}
        .daftar-pilih {display:none; position:absolute; width:100%; background:white; border:1px solid #ccc; border-top:none; z-index:999; max-height:220px; overflow-y:auto; border-radius:0 0 6px 6px;}
        .daftar-pilih a {display:block; padding:9px 12px; text-decoration:none; color:#333; border-bottom:1px solid #eee;}
        .daftar-pilih a:hover {background:#e8f8f5;} .buka {display:block;}
    </style>
</head>
<body>
    <div class="panel">
        <h2>🔐 HALAMAN PEMILIK TOKO</h2>
        <div id="info" class="pesan">✅ Berhasil! Tersimpan aman</div>

        <div class="menu-pilih">
            <button class="tombol-pilih" onclick="bukaTutup()">📋 MENU UTAMA ▼ Klik Buka</button>
            <div id="menuDaftar" class="daftar-pilih">
                <a href="catat.html">📝 CATAT PENJUALAN</a>
                <a href="daftar-harga.html">📄 LIHAT DAFTAR HARGA</a>
                <a href="cetak-nota.html">🧾 CETAK NOTA / STRUK</a>
                <a href="laporan.html">📋 LIHAT LAPORAN LENGKAP</a>
                <a href="index.html">🏪 TAMPILAN UTAMA TOKO</a>
            </div>
        </div>

        <h3>➕ MASUKKAN BARANG BARU</h3>
        <label>Nama Barang:</label><input type="text" id="namaBrg" placeholder="Kopi, Telur, Gula...">
        <label>Harga Jual:</label><input type="number" id="hargaBrg" placeholder="Misal: 3000">
        <label>Stok Masuk:</label><input type="number" id="stokBrg" placeholder="Misal: 50">
        <button class="hijau-muda" onclick="tambahBarang()">✅ SIMPAN BARANG</button>

        <h3>📋 DAFTAR SEMUA BARANG</h3>
        <div id="daftarBarang"><div class="barang-item">Belum ada barang</div></div>

        <h3>💰 KEUANGAN</h3>
        <label>Total Masuk:</label><input type="number" id="omset" value="0">
        <label>Total Keluar:</label><input type="number" id="keluar" value="0">
        <div class="kotak-laporan">KEUNTUNGAN: <span id="hasil-untung">Rp 0</span></div>
        <button class="hijau" onclick="simpanKeuangan()">💾 SIMPAN</button>
        <button class="ungu" onclick="hitungUntung()">📊 HITUNG</button>
    </div>

<script>
const SANDI_BOS = "efos"; 
let cek = prompt("⚠️ KHUSUS PEMILIK ⚠️\nMasukkan Sandi:");
if(cek !== SANDI_BOS) {alert("❌ SALAH SANDI!"); document.body.innerHTML="";}

function bukaTutup(){document.getElementById("menuDaftar").classList.toggle("buka");}
document.onclick=e=>{if(!e.target.matches('.tombol-pilih')) document.getElementById("menuDaftar").classList.remove("buka");}

function tambahBarang(){
    let nama=document.getElementById("namaBrg").value.trim();
    let harga=parseInt(document.getElementById("hargaBrg").value);
    let stok=parseInt(document.getElementById("stokBrg").value);
    if(!nama||!harga||!stok) return alert("❌ Isi lengkap!");
    let daftar=JSON.parse(localStorage.getItem("semuaBarang")||"[]");
    let ada=daftar.find(b=>b.nama.toLowerCase()===nama.toLowerCase());
    ada?ada.stok+=stok:daftar.push({nama,harga,stok});
    localStorage.setItem("semuaBarang",JSON.stringify(daftar));
    document.getElementById("namaBrg").value=document.getElementById("hargaBrg").value=document.getElementById("stokBrg").value="";
    document.getElementById("info").style.display="block"; setTimeout(()=>document.getElementById("info").style.display="none",2500);
    tampilkanDaftar();
}

function tampilkanDaftar(){
    let daftar=JSON.parse(localStorage.getItem("semuaBarang")||"[]");
    let kotak=document.getElementById("daftarBarang"); kotak.innerHTML="";
    if(daftar.length===0){kotak.innerHTML=`<div class="barang-item">Belum ada barang</div>`;return;}
    daftar.forEach((brg,i)=>{
        kotak.innerHTML+=`<div class="barang-item"><div><b>${brg.nama}</b><br><small>Rp ${brg.harga.toLocaleString('id-ID')} | Stok: ${brg.stok}</small></div>
        <button class="merah" style="padding:3px 7px;font-size:12px" onclick="hapusBarang(${i})">🗑️</button></div>`;
    });
}

function hapusBarang(i){
    let daftar=JSON.parse(localStorage.getItem("semuaBarang")||"[]");
    if(confirm(`Hapus ${daftar[i].nama}?`)){daftar.splice(i,1);localStorage.setItem("semuaBarang",JSON.stringify(daftar));tampilkanDaftar();}
}

function simpanKeuangan(){
    localStorage.setItem("omset",document.getElementById("omset").value);
    localStorage.setItem("keluar",document.getElementById("keluar").value);
    document.getElementById("info").style.display="block"; setTimeout(()=>document.getElementById("info").style.display="none",2500);
}
function hitungUntung(){
    let m=parseInt(document.getElementById("omset").value||0);
    let k=parseInt(document.getElementById("keluar").value||0);
    document.getElementById("hasil-untung").innerText="Rp "+(m-k).toLocaleString('id-ID');
}
window.onload=tampilkanDaftar;
</script>
</body>
</html>
