<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buat Akun - WAERUA INDOMARET</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        utama: '#008966',
                        sekunder: '#165DFF',
                        sukses: '#00C48C',
                        bahaya: '#F53F3F',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 font-poppins min-h-screen py-6 px-4">
    <div class="container mx-auto max-w-md">
        <a href="index.html" class="inline-flex items-center gap-2 text-utama font-bold mb-6 hover:underline">
            <i class="fa fa-arrow-left"></i> Kembali
        </a>

        <h2 class="text-center text-xl font-bold mb-2">Buat Akun Bisnis Anda</h2>
        <p class="text-center text-sm text-gray-500 mb-4">Data aman, terpisah sendiri, tidak campur dengan akun lain</p>

        <div class="bg-red-50 border border-red-200 text-red-700 p-3 rounded-xl mb-4 text-sm text-center">
            <p>✅ <b>Setiap akun punya data, laporan, barang SENDIRI-SENDIRI</b></p>
        </div>

        <div class="bg-white p-5 rounded-2xl shadow-lg">
            <form id="formDaftar" class="space-y-4">
                <div>
                    <label class="font-semibold mb-1 block flex items-center gap-2">
                        <i class="fa fa-user text-gray-600"></i> Nama Akun / ID Pengguna *
                    </label>
                    <input type="text" id="dnama" placeholder="Contoh: Waerua01 / Indomaret01" class="w-full border rounded-xl p-3" required>
                </div>

                <div>
                    <label class="font-semibold mb-1 block flex items-center gap-2">
                        <i class="fa fa-lock text-gray-600"></i> Kata Sandi *
                    </label>
                    <input type="password" id="dsandi" placeholder="Buat sandi aman" class="w-full border rounded-xl p-3" required>
                </div>

                <hr class="border-dashed">

                <div>
                    <label class="font-semibold mb-1 block flex items-center gap-2">
                        <i class="fa fa-building text-gray-600"></i> Nama Usaha / Toko *
                    </label>
                    <input type="text" id="dbisnis" placeholder="WAERUA INDOMARET" class="w-full border rounded-xl p-3" required>
                </div>

                <div>
                    <label class="font-semibold mb-1 block flex items-center gap-2">
                        <i class="fa fa-map-marker text-gray-600"></i> Alamat Lengkap *
                    </label>
                    <textarea id="dalamat" placeholder="Desa Compang Mekar, Kec. Lamba Leda, Manggarai Timur" class="w-full border rounded-xl p-3" required></textarea>
                </div>

                <div>
                    <label class="font-semibold mb-1 block flex items-center gap-2">
                        <i class="fa fa-phone text-gray-600"></i> Nomor HP / WA *
                    </label>
                    <input type="text" id="dhp" placeholder="081327913004" class="w-full border rounded-xl p-3" required>
                </div>

                <button type="submit" class="w-full bg-sukses text-white py-3 rounded-xl font-bold hover:bg-sukses/90 transition mt-2">
                    <i class="fa fa-check"></i> ✅ BUAT & SIMPAN AKUN
                </button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('formDaftar').addEventListener('submit', function(e) {
            e.preventDefault();
            // KODE UNIK PEMISAH DATA UTAMA
            let kodeAkun = 'AKUN_' + Math.random().toString(36).substr(2, 8) + '_' + Date.now();

            let dataBaru = {
                id: kodeAkun,
                nama: document.getElementById('dnama').value.trim(),
                sandi: document.getElementById('dsandi').value.trim(),
                namaToko: document.getElementById('dbisnis').value.trim(),
                alamat: document.getElementById('dalamat').value.trim(),
                hp: document.getElementById('dhp').value.trim()
            };

            let semua = JSON.parse(localStorage.getItem('semuaAkun')) || [];
            if(semua.find(a => a.nama === dataBaru.nama)) return alert('❌ Nama akun SUDAH ADA!');

            semua.push(dataBaru);
            localStorage.setItem('semuaAkun', JSON.stringify(semua));
            // BUAT TEMPAT PENYIMPANAN KHUSUS AKUN INI SAJA
            localStorage.setItem('data_' + kodeAkun, JSON.stringify({
                daftarBarang: [],
                barangMasuk: [],
                barangKeluar: [],
                catatPenjualan: [],
                laporan: []
            }));

            alert('✅ Berhasil daftar! Silakan Login');
            window.location.href = 'login.html';
        })
    </script>
</body>
</html>
